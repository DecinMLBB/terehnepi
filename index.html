<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terehnepi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  display: flex;
  align-items: center;
}

.logo img {
  height: 40px;
  margin-right: 10px;
}

/* NAV */
nav {
  display: flex;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 500;
  transition: 0.2s;
}

nav a:hover {
  color: #22c55e;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
  z-index: 1001;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: #22c55e;
  filter: blur(120px);
  top: -50px;
  right: -50px;
  opacity: 0.3;
}

.hero img {
  width: 110px;
  margin-bottom: 10px;
}

.hero h2 {
  font-size: 32px;
  margin-bottom: 10px;
}

.hero p {
  max-width: 500px;
  margin: auto;
  opacity: 0.8;
}

/* BUTTON */
.btn {
  background: #22c55e;
  padding: 14px 25px;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  display: inline-block;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  background: #16a34a;
  transform: translateY(-2px);
}

/* CONTAINER */
.container {
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

/* TITLE */
.title {
  text-align: center;
  margin-bottom: 20px;
}

/* GRID */
.services {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-7px);
}

/* FEATURE */
.features {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
  margin-top: 40px;
}

.feature {
  background: #1e293b;
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

/* ANIMASI */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.8s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width:768px) {

  .menu-toggle {
    display: block;
  }

  nav {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0f172a;
    flex-direction: column;
    align-items: center;
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
    z-index: 9999;
  }

  nav.active {
    max-height: 300px;
  }

  nav a {
    padding: 15px;
    width: 100%;
    text-align: center;
  }

  .services {
    grid-template-columns: repeat(2,1fr);
  }

  .features {
    grid-template-columns: 1fr;
  }
}

/* HP */
@media(max-width:480px) {
  .services {
    grid-template-columns: 1fr;
  }

  .hero h2 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <h2>Terehnepi</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()" id="menuBtn">☰</div>

  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="order.html">Order</a>
    <a href="kurir.html">Kurir</a>
  </nav>
</header>

<section class="hero fade">
  <img src="logo.png">
  <h2>Gaskeun, Pasti Nepi 🚀</h2>
  <p>Layanan kurir lokal tercepat area Conggeang, Buahdua, dan Paseh.</p>
  <a href="order.html" class="btn">Order Sekarang</a>
</section>

<div class="container fade">
  <h2 class="title">Layanan Kami</h2>

  <div class="services">
    <div class="card">📦 Kurir Barang<br><small>Antar cepat & aman</small></div>
    <div class="card">🛒 Jasa Titip<br><small>Beli tanpa ribet</small></div>
    <div class="card">🏍️ Ojek Lokal<br><small>Siap antar kapan saja</small></div>
  </div>

  <div class="features">
    <div class="feature">⚡ Cepat</div>
    <div class="feature">💬 Langsung WA</div>
    <div class="feature">📍 Area Lokal</div>
  </div>
</div>

<script>
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.getElementById("menuBtn");

  nav.classList.toggle("active");

  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// klik luar
document.addEventListener("click", function(e) {
  const nav = document.getElementById("navMenu");
  const btn = document.getElementById("menuBtn");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    btn.innerHTML = "☰";
  }
});

// animasi scroll
const fades = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 50) {
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>

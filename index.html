<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terehnepi - Gaskeun, Pasti Nepi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #0f172a;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav {
  display: flex;
}

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: #1e293b;
  color: white;
}

.btn {
  background: #22c55e;
  padding: 12px 20px;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  display: inline-block;
  margin-top: 10px;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  margin-top: 15px;
  border-radius: 10px;
}

/* FORM */
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

/* ANIMASI */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -220px;
  top: 0;
  width: 200px;
  height: 100%;
  background: #0f172a;
  color: white;
  transition: 0.3s;
  padding-top: 20px;
}

.sidebar a {
  display: block;
  padding: 10px 20px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #1e293b;
}

.sidebar.active {
  left: 0;
}

/* CONTENT SHIFT */
.main {
  transition: 0.3s;
}

.main.shift {
  margin-left: 200px;
}

/* MOBILE */
@media(max-width:768px) {
  nav {
    display: none;
    flex-direction: column;
    position: absolute;
    right: 0;
    top: 60px;
    background: #0f172a;
    width: 200px;
  }

  nav.active {
    display: flex;
  }

  .menu-toggle {
    display: block;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#">Dashboard</a>
  <a href="#">Order Masuk</a>
  <a href="#">Driver</a>
</div>

<!-- HEADER -->
<header>
  <h1>Terehnepi</h1>

  <div>
    <span class="menu-toggle" onclick="toggleMenu()">☰</span>
    <span class="menu-toggle" onclick="toggleSidebar()">📊</span>
  </div>

  <nav id="navMenu">
    <a href="#home">Home</a>
    <a href="#layanan">Layanan</a>
    <a href="#order">Order</a>
  </nav>
</header>

<div class="main" id="main">

<!-- HERO -->
<section class="hero fade-in" id="home">
  <h2>Gaskeun, Pasti Nepi 🚀</h2>
  <p>Kurir lokal Conggeang - Buahdua - Paseh</p>
  <a href="#order" class="btn">Order Sekarang</a>
</section>

<!-- LAYANAN -->
<div class="container fade-in" id="layanan">
  <h2>Layanan Kami</h2>

  <div class="card">📦 Kurir Barang</div>
  <div class="card">🛒 Jasa Titip</div>
  <div class="card">🏍️ Ojek Barang</div>
</div>

<!-- ORDER -->
<div class="container fade-in" id="order">
  <h2>Form Order</h2>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="jemput" placeholder="Alamat Jemput">
  <input type="text" id="tujuan" placeholder="Alamat Tujuan">

  <select id="layananSelect">
    <option>Kurir Barang</option>
    <option>Jasa Titip</option>
    <option>Ojek Barang</option>
  </select>

  <button onclick="kirimWA()">Kirim via WhatsApp</button>
</div>

</div>

<script>
function toggleMenu() {
  document.getElementById("navMenu").classList.toggle("active");
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("main").classList.toggle("shift");
}

function kirimWA() {
  let nama = document.getElementById("nama").value;
  let jemput = document.getElementById("jemput").value;
  let tujuan = document.getElementById("tujuan").value;
  let layanan = document.getElementById("layananSelect").value;

  let pesan = `Halo, saya ${nama}%0A` +
              `Jemput: ${jemput}%0A` +
              `Tujuan: ${tujuan}%0A` +
              `Layanan: ${layanan}`;

  let url = "https://wa.me/628XXXXXXXXXX?text=" + pesan;

  window.open(url, "_blank");
}
</script>

</body>
</html>

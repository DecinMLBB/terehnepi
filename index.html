<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terehnepi</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #0f172a;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1000;
}

.logo {
  display: flex;
  align-items: center;
}

.logo img {
  height: 40px;
  margin-right: 10px;
}

/* NAV */
nav {
  display: flex;
  gap: 15px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 500;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
  z-index: 1001;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: #1e293b;
  color: white;
  position: relative;
  z-index: 1;
}

.hero img {
  width: 100px;
}

/* BUTTON */
.btn {
  background: #22c55e;
  padding: 12px 20px;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  display: inline-block;
  margin-top: 15px;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

/* GRID */
.services {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* MOBILE */
@media(max-width:768px) {

  .menu-toggle {
    display: block;
  }

  nav {
    position: fixed; /* INI KUNCI FIX */
    top: 60px;
    left: 0;
    width: 100%;
    background: #0f172a;

    flex-direction: column;
    align-items: center;

    max-height: 0;
    overflow: hidden;
    transition: 0.3s ease;

    z-index: 9999; /* PALING ATAS */
  }

  nav a {
    padding: 15px;
    width: 100%;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  nav.active {
    max-height: 300px;
  }

  .services {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* HP */
@media(max-width:480px) {
  .services {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="logo">
    <h2>Terehnepi</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()" id="menuBtn">☰</div>

  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="order.html">Order</a>
    <a href="kurir.html">List Kurir</a>
  </nav>
</header>

<section class="hero">
  <img src="logo.png" alt="logo">
  <h2>Gaskeun, Pasti Nepi 🚀</h2>
  <p>
    Terehnepi adalah layanan kurir lokal area Conggeang, Buahdua, dan Paseh.
  </p>
  <a href="order.html" class="btn">Order Sekarang</a>
</section>

<div class="container">
  <h2>Layanan Kami</h2>

  <div class="services">
    <div class="card">📦 Kurir Barang</div>
    <div class="card">🛒 Jasa Titip</div>
    <div class="card">🏍️ Ojek Barang</div>
  </div>
</div>

<script>
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.getElementById("menuBtn");

  nav.classList.toggle("active");

  if (nav.classList.contains("active")) {
    btn.innerHTML = "✕";
  } else {
    btn.innerHTML = "☰";
  }
}

/* AUTO CLOSE KALAU KLIK LUAR */
document.addEventListener("click", function(e) {
  const nav = document.getElementById("navMenu");
  const btn = document.getElementById("menuBtn");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    btn.innerHTML = "☰";
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terehnepi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo { display: flex; align-items: center; }
.logo img { height: 40px; margin-right: 10px; }

/* NAV */
nav { display: flex; gap: 20px; }
nav a {
  color: white;
  text-decoration: none;
  font-weight: 500;
}

nav a:hover { color: #22c55e; }

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.hero img { width: 110px; }

.hero h2 { font-size: 32px; }

.btn {
  background: #22c55e;
  padding: 14px 25px;
  color: white;
  border-radius: 8px;
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
}

/* CONTAINER */
.container {
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

.title { text-align: center; }

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

/* TESTIMONI */
.testimoni-wrapper {
  overflow-x: auto;
  display: flex;
  gap: 15px;
  margin-top: 20px;
  scroll-behavior: smooth;
}

.testimoni-card {
  min-width: 250px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.testimoni-card small {
  color: gray;
}

/* MOBILE */
@media(max-width:768px) {
  .menu-toggle { display: block; }

  nav {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    background: #0f172a;
    flex-direction: column;
    max-height: 0;
    overflow: hidden;
  }

  nav.active { max-height: 300px; }

  .services {
    grid-template-columns: repeat(2,1fr);
  }
}

@media(max-width:480px) {
  .services {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <h2>Terehnepi</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()" id="menuBtn">☰</div>

  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="order.html">Order</a>
    <a href="kurir.html">Kurir</a>
  </nav>
</header>

<section class="hero">
  <img src="logo.png">
  <h2>Gaskeun, Pasti Nepi 🚀</h2>
  <p>Layanan kurir lokal tercepat area Conggeang, Buahdua, dan Paseh.</p>
  <a href="order.html" class="btn">Order Sekarang</a>
</section>

<div class="container">
  <h2 class="title">Layanan Kami</h2>

  <div class="services">
    <div class="card">📦 Kurir Barang</div>
    <div class="card">🛒 Jasa Titip</div>
    <div class="card">🏍️ Ojek Lokal</div>
  </div>
</div>

<!-- TESTIMONI -->
<div class="container">
  <h2 class="title">Testimoni Customer</h2>

  <div class="testimoni-wrapper" id="testimoniList"></div>
</div>

<script>
// NAV
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.getElementById("menuBtn");

  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// AUTO CLOSE
document.addEventListener("click", function(e) {
  const nav = document.getElementById("navMenu");
  const btn = document.getElementById("menuBtn");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    btn.innerHTML = "☰";
  }
});

// ================= TESTIMONI =================
const namaRandom = ["Andi","Budi","Rina","Sari","Dika","Asep","Rizky","Fajar","Putri","Dewi"];
const komentar = [
  "Cepet banget anjir 🔥",
  "Kurirnya ramah 👍",
  "Murah + cepat, mantap",
  "Gak nyangka secepet ini",
  "Langganan sih ini",
  "Mantap poll",
  "Driver nya santuy",
  "Rekomended banget",
  "Top service 🔥",
  "Fix pake lagi"
];

const list = document.getElementById("testimoniList");

for (let i = 0; i < 100; i++) {
  let nama = namaRandom[Math.floor(Math.random()*namaRandom.length)];
  let komen = komentar[Math.floor(Math.random()*komentar.length)];
  let hari = Math.floor(Math.random()*7)+1;

  list.innerHTML += `
    <div class="testimoni-card">
      <b>${nama}</b><br>
      <small>${hari} hari yang lalu</small>
      <p>${komen}</p>
    </div>
  `;
}

// AUTO SCROLL
setInterval(() => {
  list.scrollLeft += 1;
}, 20);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEREHNEPI - Kurir Lokal Cepat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* HEADER (CENTER ONLY) */
header {
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  display: flex;
  align-items: center;
}

.logo img {
  height: 45px;
  margin-right: 10px;
}

.logo h2 {
  margin: 0;
  letter-spacing: 1px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 110px 20px;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: "";
  position: absolute;
  width: 350px;
  height: 350px;
  background: #22c55e;
  filter: blur(140px);
  top: -80px;
  right: -80px;
  opacity: 0.3;
}

.hero img {
  width: 140px;
  margin-bottom: 10px;
}

.hero h2 {
  font-size: 36px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.8;
  max-width: 500px;
  margin: auto;
}

/* CTA */
.btn {
  background: #22c55e;
  padding: 18px 32px;
  color: white;
  border-radius: 12px;
  display: inline-block;
  margin-top: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.25s;
}

.btn:hover {
  background: #16a34a;
  transform: translateY(-3px);
}

.btn-secondary {
  background: white;
  color: #0f172a;
  padding: 14px 24px;
  margin-top: 10px;
}

.btn-secondary:hover {
  background: #e5e7eb;
}

/* CTA ROW */
.cta-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
  flex-wrap: wrap;
}

/* TRUST */
.trust {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.8;
}

/* CONTAINER */
.container {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
  border-bottom: 1px solid #e5e7eb;
}

.title {
  text-align: center;
  margin-bottom: 25px;
}

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

/* TESTIMONI */
.testimoni-wrapper {
  overflow: hidden;
  position: relative;
}

.testimoni-wrapper::before,
.testimoni-wrapper::after {
  content: "";
  position: absolute;
  top: 0;
  width: 60px;
  height: 100%;
}

.testimoni-wrapper::before {
  left: 0;
  background: linear-gradient(to right, #f5f5f5, transparent);
}

.testimoni-wrapper::after {
  right: 0;
  background: linear-gradient(to left, #f5f5f5, transparent);
}

.testimoni-track {
  display: flex;
  gap: 15px;
  width: max-content;
  animation: jalan 120s linear infinite;
}

.testimoni-card {
  min-width: 250px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.testimoni-card small {
  color: gray;
}

@keyframes jalan {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* MOBILE */
@media(max-width:768px) {
  .services {
    grid-template-columns: repeat(2,1fr);
  }
}

@media(max-width:480px) {
  .services {
    grid-template-columns: 1fr;
  }

  .hero h2 {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <h2>TEREHNEPI</h2>
  </div>
</header>

<section class="hero">
  <img src="logo.png">
  <h2>TEREH ORDERNA NEPI TUJUANA 🚀</h2>
  <p>Kurir lokal super cepat area Conggeang, Buahdua, dan Paseh.</p>

  <!-- CTA UTAMA -->
  <a href="order.html" class="btn">
    ORDER SEKARANG ⚡
  </a>

  <!-- CTA TAMBAHAN -->
  <div class="cta-row">
    <a href="https://LINK-TOPUP-LU.COM" class="btn btn-secondary">
      Topup 🔥
    </a>

    <a href="kurir.html" class="btn btn-secondary">
      Kurir 🚚
    </a>
  </div>

  <div class="trust">
    ⭐ 4.9 / 5 • 500+ pelanggan puas
  </div>
</section>

<div class="container">
  <h2 class="title">Kenapa Pilih TEREHNEPI?</h2>

  <div class="services">
    <div class="card">⚡ Respon Cepat<br><small>Hitungan menit</small></div>
    <div class="card">🏍️ Kurir Ramah<br><small>Selalu standby</small></div>
    <div class="card">💰 Harga Jelas<br><small>Transparan</small></div>
  </div>
</div>

<div class="container">
  <h2 class="title">Testimoni Customer</h2>

  <div class="testimoni-wrapper">
    <div class="testimoni-track" id="testimoniList"></div>
  </div>
</div>

<script>
const namaRandom = ["A***","Bu**","Ri**","Sa***","D****","A****","Ri****","Faj**","Pu***","De**"];
const komentar = [
  "Cepet banget 🔥",
  "Kurirnya ramah 👍",
  "Murah + cepat",
  "Langganan sih ini",
  "Mantap poll",
  "Driver santuy",
  "Rekomended banget",
  "Top service 🔥"
];

const list = document.getElementById("testimoniList");

let html = "";

for (let i = 0; i < 50; i++) {
  let nama = namaRandom[Math.floor(Math.random()*namaRandom.length)];
  let komen = komentar[Math.floor(Math.random()*komentar.length)];
  let hari = Math.floor(Math.random()*7)+1;

  html += `
    <div class="testimoni-card">
      <b>${nama}</b><br>
      <small>${hari} hari yang lalu</small>
      <p>${komen}</p>
    </div>
  `;
}

list.innerHTML = html + html;
</script>

</body>
</html>

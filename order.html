<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - TEREHNEPI</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}

.kurir-box {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  text-align: center;
}

/* HIDE */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>Order TEREHNEPI</h2>

  <div class="card">

    <input type="text" id="nama" placeholder="Nama Anda">

    <label>Jenis Layanan</label>
    <select id="jenis">
      <option>Ojek Orang</option>
      <option>Kirim Barang</option>
      <option>Jastip</option>
    </select>

    <!-- NORMAL -->
    <div id="normalForm">
      <label>Jemput (Desa)</label>
      <select id="jemput"></select>

      <label>Tujuan (Desa)</label>
      <select id="tujuan"></select>

      <label><input type="checkbox" id="pp"> PP (Bolak-balik)</label>
    </div>

    <!-- JASTIP -->
    <div id="jastipForm" class="hidden">
      <input type="text" id="toko" placeholder="Nama Toko / Tempat">
      <textarea id="barang" placeholder="Barang yang dibeli (detail ya jangan nyusahin kurir)"></textarea>
    </div>

    <textarea id="catatan" placeholder="Detail alamat / patokan jelas"></textarea>

    <div class="result" id="harga">Estimasi Harga: -</div>
    <div class="kurir-box" id="kurir">Kurir: -</div>

    <button onclick="kirimWA()">ORDER SEKARANG</button>

  </div>
</div>

<script>
// ================= DATA =================
const desa = [
"Babakan Asem","Cacaban","Cibeureuyeuh","Cibubuan","Cipamekar",
"Conggeang Kulon","Conggeang Wetan","Jambu","Karanglayung",
"Narimbang","Padaasih","Ungkal",
"Bojongloa","Buahdua","Ciawitali","Cibitung","Cikaramas",
"Cikurubuk","Cilangkap","Citaleus","Gendereh","Hariang",
"Karangbungur","Mekarmukti","Nagrak","Sekarwangi",
"Paseh Kidul","Paseh Kaler","Bongkok","Mekarpawitan"
];

const jemputEl = document.getElementById("jemput");
const tujuanEl = document.getElementById("tujuan");

desa.forEach(d => {
  jemputEl.innerHTML += `<option>${d}</option>`;
  tujuanEl.innerHTML += `<option>${d}</option>`;
});

// ================= KURIR =================
const kurir = {
  cacan: "6283178712134",
  denny: "6285156287358"
};

function getKurir() {
  const jam = new Date().getHours();

  if (jam >= 7 && jam < 13) return { nama: "Cacan", no: kurir.cacan };
  if (jam >= 13 && jam < 17) return { nama: "Denny", no: kurir.denny };
  if (jam >= 17 && jam < 22) return { nama: "Cacan", no: kurir.cacan };

  return { nama: "OFFLINE", no: null };
}

// ================= SWITCH FORM =================
document.getElementById("jenis").addEventListener("change", function() {
  const jenis = this.value;

  document.getElementById("normalForm").classList.toggle("hidden", jenis === "Jastip");
  document.getElementById("jastipForm").classList.toggle("hidden", jenis !== "Jastip");

  hitung();
});

// ================= HARGA =================
function hitung() {
  let jenis = document.getElementById("jenis").value;
  let harga = 0;

  if (jenis === "Jastip") {
    harga = 15000; // base jastip
  } else {
    harga = 10000;
    if (document.getElementById("pp").checked) harga *= 2;
    if (jenis === "Ojek Orang") harga += 2000;
  }

  document.getElementById("harga").innerText =
    "Estimasi Harga: Rp " + harga.toLocaleString();

  let k = getKurir();
  document.getElementById("kurir").innerText =
    "Kurir Aktif: " + k.nama;

  return harga;
}

// ================= AUTO UPDATE =================
document.querySelectorAll("input, select, textarea").forEach(el => {
  el.addEventListener("change", hitung);
});

// ================= WA =================
function kirimWA() {
  let nama = document.getElementById("nama").value.trim();
  if (!nama) return alert("Isi nama dulu");

  let jenis = document.getElementById("jenis").value;
  let k = getKurir();

  if (!k.no) return alert("Layanan tutup (07:00 - 22:00)");

  let harga = hitung();
  let catatan = document.getElementById("catatan").value;

  let pesan = "";

  if (jenis === "Jastip") {
    let toko = document.getElementById("toko").value;
    let barang = document.getElementById("barang").value;

    pesan =
`Halo ${k.nama}, saya ${nama}

Order JASTIP:
- Toko: ${toko}
- Barang: ${barang}
- Catatan: ${catatan}
- Harga: Rp ${harga.toLocaleString()}`;
  } else {
    let jemput = jemputEl.value;
    let tujuan = tujuanEl.value;
    let pp = document.getElementById("pp").checked;

    pesan =
`Halo ${k.nama}, saya ${nama}

Order:
- ${jenis}
- Jemput: ${jemput}
- Tujuan: ${tujuan}
- PP: ${pp ? "Ya" : "Tidak"}
- Catatan: ${catatan}
- Harga: Rp ${harga.toLocaleString()}`;
  }

  window.open(
    "https://wa.me/" + k.no + "?text=" + encodeURIComponent(pesan),
    "_blank"
  );
}

// INIT
hitung();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - TEREHNEPI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* HEADER */
header {
  padding: 15px 20px;
}

.back-home {
  color: #22c55e;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

.back-home:hover {
  text-decoration: underline;
}

/* CONTAINER */
.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.5);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
  transition: 0.25s;
}

button:hover {
  background: #16a34a;
  transform: translateY(-2px);
}

/* RESULT */
.result {
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}

.kurir-box {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  text-align: center;
}

/* HIDE */
.hidden { display: none; }

</style>
</head>

<body>

<header>
  <a href="index.html" class="back-home">← Kembali ke Home</a>
</header>

<div class="container">
  <h2>ORDER TEREHNEPI</h2>

  <div class="card">

    <input type="text" id="nama" placeholder="Nama Anda">

    <label>Jenis Layanan</label>
    <select id="jenis">
      <option>Ojek Orang</option>
      <option>Kirim Barang</option>
      <option>Jastip</option>
    </select>

    <!-- NORMAL -->
    <div id="normalForm">
      <select id="jemput"></select>
      <select id="tujuan"></select>
      <label><input type="checkbox" id="pp"> PP (Bolak-balik)</label>
    </div>

    <!-- JASTIP -->
    <div id="jastipForm" class="hidden">
      <input type="text" id="toko" placeholder="Nama Toko">
      <textarea id="barang" placeholder="Barang yang dibeli"></textarea>
    </div>

    <textarea id="catatan" placeholder="Detail alamat / patokan"></textarea>

    <div class="result" id="harga">Estimasi Harga: -</div>
    <div class="kurir-box" id="kurir">Kurir: -</div>

    <button onclick="kirimWA()">ORDER SEKARANG ⚡</button>

  </div>
</div>

<script>
// DATA
const desa = ["Babakan Asem","Cacaban","Cibeureuyeuh","Cibubuan","Cipamekar",
"Conggeang Kulon","Conggeang Wetan","Jambu","Karanglayung",
"Narimbang","Padaasih","Ungkal",
"Bojongloa","Buahdua","Ciawitali","Cibitung","Cikaramas",
"Cikurubuk","Cilangkap","Citaleus","Gendereh","Hariang",
"Karangbungur","Mekarmukti","Nagrak","Sekarwangi",
"Paseh Kidul","Paseh Kaler","Bongkok","Mekarpawitan"];

const jemputEl = document.getElementById("jemput");
const tujuanEl = document.getElementById("tujuan");

desa.forEach(d => {
  jemputEl.innerHTML += `<option>${d}</option>`;
  tujuanEl.innerHTML += `<option>${d}</option>`;
});

// KURIR
const kurir = {
  cacan: "6283178712134",
  denny: "6285156287358"
};

function getKurir() {
  const jam = new Date().getHours();
  if (jam >= 7 && jam < 13) return { nama: "Cacan", no: kurir.cacan };
  if (jam >= 13 && jam < 17) return { nama: "Denny", no: kurir.denny };
  if (jam >= 17 && jam < 22) return { nama: "Cacan", no: kurir.cacan };
  return { nama: "OFFLINE", no: null };
}

// SWITCH
document.getElementById("jenis").addEventListener("change", function() {
  const j = this.value;
  document.getElementById("normalForm").classList.toggle("hidden", j === "Jastip");
  document.getElementById("jastipForm").classList.toggle("hidden", j !== "Jastip");
  hitung();
});

// HARGA
function hitung() {
  let jenis = document.getElementById("jenis").value;
  let harga = (jenis === "Jastip") ? 15000 : 10000;

  if (jenis === "Ojek Orang") harga += 2000;
  if (document.getElementById("pp").checked) harga *= 2;

  document.getElementById("harga").innerText =
    "Estimasi Harga: Rp " + harga.toLocaleString();

  let k = getKurir();
  document.getElementById("kurir").innerText =
    "Kurir Aktif: " + k.nama;

  return harga;
}

// AUTO
document.querySelectorAll("input, select, textarea").forEach(el => {
  el.addEventListener("change", hitung);
});

// WA
function kirimWA() {
  let nama = document.getElementById("nama").value.trim();
  if (!nama) return alert("Isi nama dulu");

  let jenis = document.getElementById("jenis").value;
  let k = getKurir();
  if (!k.no) return alert("Layanan tutup");

  let harga = hitung();
  let catatan = document.getElementById("catatan").value;

  let pesan = "";

  if (jenis === "Jastip") {
    let toko = document.getElementById("toko").value;
    let barang = document.getElementById("barang").value;

    pesan = `Halo ${k.nama}, saya ${nama}

JASTIP:
Toko: ${toko}
Barang: ${barang}
Catatan: ${catatan}
Harga: Rp ${harga}`;
  } else {
    pesan = `Halo ${k.nama}, saya ${nama}

${jenis}
Jemput: ${jemputEl.value}
Tujuan: ${tujuanEl.value}
Catatan: ${catatan}
Harga: Rp ${harga}`;
  }

  window.open("https://wa.me/" + k.no + "?text=" + encodeURIComponent(pesan));
}

hitung();
</script>

</body>
</html>

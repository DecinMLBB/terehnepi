<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Terehnepi</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

input, select, textarea, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  background: #22c55e;
  color: white;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Order Terehnepi</h2>

  <input type="text" id="nama" placeholder="Nama Anda">

  <label>Jenis Layanan</label>
  <select id="jenis">
    <option value="Ojek Orang">Ojek Orang</option>
    <option value="Kirim Barang">Kirim Barang</option>
  </select>

  <label>Jemput (Desa)</label>
  <select id="jemput">
    <option>Babakan Asem</option>
    <option>Cacaban</option>
    <option>Cibeureuyeuh</option>
    <option>Cibubuan</option>
    <option>Cipamekar</option>
    <option>Conggeang Kulon</option>
    <option>Conggeang Wetan</option>
    <option>Jambu</option>
    <option>Karanglayung</option>
    <option>Narimbang</option>
    <option>Padaasih</option>
    <option>Ungkal</option>
  </select>

  <label>Tujuan (Desa)</label>
  <select id="tujuan">
    <option>Babakan Asem</option>
    <option>Cacaban</option>
    <option>Cibeureuyeuh</option>
    <option>Cibubuan</option>
    <option>Cipamekar</option>
    <option>Conggeang Kulon</option>
    <option>Conggeang Wetan</option>
    <option>Jambu</option>
    <option>Karanglayung</option>
    <option>Narimbang</option>
    <option>Padaasih</option>
    <option>Ungkal</option>
  </select>

  <textarea id="catatan" placeholder="Detail alamat / patokan (wajib jelas)"></textarea>

  <div class="result" id="harga">Estimasi Harga: -</div>

  <button onclick="hitung()">Hitung Harga</button>
  <button onclick="kirimWA()">Order Sekarang</button>
</div>

<script>
// DATA KURIR (ISI NOMOR ASLI LU)
const kurir = {
  cacan: "628XXXXXXXXXX",
  denny: "628XXXXXXXXXX",
  gathan: "628XXXXXXXXXX"
};

// PILIH KURIR BERDASARKAN JAM
function getKurir() {
  let jam = new Date().getHours();

  if (jam >= 7 && jam < 13) return { nama: "Cacan", no: kurir.cacan };
  if (jam >= 13 && jam < 17) return { nama: "Denny", no: kurir.denny };
  if (jam >= 17 && jam < 22) return { nama: "Gathan", no: kurir.gathan };

  return { nama: "Offline", no: kurir.cacan };
}

// HITUNG HARGA
function hitung() {
  let jemput = document.getElementById("jemput").value;
  let tujuan = document.getElementById("tujuan").value;
  let jenis = document.getElementById("jenis").value;

  let harga = 5000;

  // beda desa
  if (jemput !== tujuan) {
    harga += 3000;
  }

  // rute jauh (contoh kasar)
  if (
    (jemput === "Babakan Asem" && tujuan === "Ungkal") ||
    (jemput === "Ungkal" && tujuan === "Babakan Asem")
  ) {
    harga += 3000;
  }

  // orang lebih mahal
  if (jenis === "Ojek Orang") {
    harga += 2000;
  }

  document.getElementById("harga").innerText =
    "Estimasi Harga: Rp " + harga.toLocaleString();

  return harga;
}

// KIRIM WA
function kirimWA() {
  let nama = document.getElementById("nama").value.trim();
  let jemput = document.getElementById("jemput").value;
  let tujuan = document.getElementById("tujuan").value;
  let jenis = document.getElementById("jenis").value;
  let catatan = document.getElementById("catatan").value;

  if (nama === "") {
    alert("Nama wajib diisi, jangan misterius");
    return;
  }

  let harga = hitung();
  let kurirAktif = getKurir();

  let pesan =
`Halo ${kurirAktif.nama}, saya ${nama}

Order Terehnepi:
- Jenis: ${jenis}
- Jemput: ${jemput}
- Tujuan: ${tujuan}
- Catatan: ${catatan}
- Estimasi Harga: Rp ${harga.toLocaleString()}`;

  let url = "https://wa.me/" + kurirAktif.no + "?text=" + encodeURIComponent(pesan);

  window.open(url, "_blank");
}
</script>

</body>
</html>

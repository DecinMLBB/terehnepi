<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Terehnepi</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}

.kurir-box {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>Order Terehnepi</h2>

  <input type="text" id="nama" placeholder="Nama Anda">

  <label>Jenis Layanan</label>
  <select id="jenis">
    <option>Ojek Orang</option>
    <option>Kirim Barang</option>
  </select>

  <label>Jemput (Desa)</label>
  <select id="jemput"></select>

  <label>Tujuan (Desa)</label>
  <select id="tujuan"></select>

  <label><input type="checkbox" id="pp"> PP (Bolak-balik)</label>

  <textarea id="catatan" placeholder="Detail alamat / patokan jelas"></textarea>

  <div class="result" id="harga">Estimasi Harga: -</div>
  <div class="kurir-box" id="kurir">Kurir: -</div>

  <button onclick="kirimWA()">Order Sekarang</button>
</div>

<script>
// ================= DATA =================
const conggeang = [
"Babakan Asem","Cacaban","Cibeureuyeuh","Cibubuan","Cipamekar",
"Conggeang Kulon","Conggeang Wetan","Jambu","Karanglayung",
"Narimbang","Padaasih","Ungkal"
];

const buahdua = [
"Bojongloa","Buahdua","Ciawitali","Cibitung","Cikaramas",
"Cikurubuk","Cilangkap","Citaleus","Gendereh","Hariang",
"Karangbungur","Mekarmukti","Nagrak","Sekarwangi"
];

const paseh = [
"Paseh Kidul","Paseh Kaler","Bongkok","Mekarpawitan"
];

const semuaDesa = [...conggeang, ...buahdua, ...paseh];

const jemputEl = document.getElementById("jemput");
const tujuanEl = document.getElementById("tujuan");

// isi dropdown
semuaDesa.forEach(desa => {
  jemputEl.innerHTML += `<option>${desa}</option>`;
  tujuanEl.innerHTML += `<option>${desa}</option>`;
});

function getArea(desa) {
  if (conggeang.includes(desa)) return "Conggeang";
  if (buahdua.includes(desa)) return "Buahdua";
  if (paseh.includes(desa)) return "Paseh";
  return "Lain";
}

// ================= KURIR =================
const kurir = {
  cacan: "6283178712134",
  denny: "6285156287358",
  gathan: "6283178712134"
};

function getKurir() {
  const sekarang = new Date().toLocaleString("en-US", {
    timeZone: "Asia/Jakarta"
  });

  const jam = new Date(sekarang).getHours();

  if (jam >= 7 && jam < 13) return { nama: "Cacan", no: kurir.cacan };
  if (jam >= 13 && jam < 17) return { nama: "Denny", no: kurir.denny };
  if (jam >= 17 && jam < 22) return { nama: "Gathan", no: kurir.gathan };

  return { nama: "OFFLINE", no: null };
}

// ================= HARGA =================
function hitung() {
  let jemput = jemputEl.value;
  let tujuan = tujuanEl.value;
  let jenis = document.getElementById("jenis").value;
  let pp = document.getElementById("pp").checked;

  let areaJ = getArea(jemput);
  let areaT = getArea(tujuan);

  let harga = 0;

  const desaJauh = ["Babakan Asem", "Padaasih", "Ungkal"];

  // CONGGEANG DALAM
  if (areaJ === "Conggeang" && areaT === "Conggeang") {
    harga = 10000;

    if (
      desaJauh.includes(jemput) ||
      desaJauh.includes(tujuan)
    ) {
      harga += 3000;
    }
  }

  // ANTAR KECAMATAN
  else if (areaJ !== areaT) {
    harga = 20000;
  }

  // fallback
  else {
    harga = 15000;
  }

  // PP
  if (pp) harga += 10000;

  // jenis layanan
  if (jenis === "Ojek Orang") harga += 2000;

  document.getElementById("harga").innerText =
    "Estimasi Harga: Rp " + harga.toLocaleString();

  let k = getKurir();
  document.getElementById("kurir").innerText =
    "Kurir Aktif: " + k.nama;

  return harga;
}

// ================= AUTO UPDATE =================
document.querySelectorAll("select, input, textarea").forEach(el => {
  el.addEventListener("change", hitung);
});

// ================= WA =================
function kirimWA() {
  let nama = document.getElementById("nama").value.trim();

  if (nama === "") {
    alert("Nama jangan kosong");
    return;
  }

  let k = getKurir();

  if (!k.no) {
    alert("Layanan buka 07:00 - 22:00 WIB");
    return;
  }

  let harga = hitung();
  let jemput = jemputEl.value;
  let tujuan = tujuanEl.value;
  let jenis = document.getElementById("jenis").value;
  let catatan = document.getElementById("catatan").value;

  let pesan =
`Halo ${k.nama}, saya ${nama}

Order Terehnepi:
- ${jenis}
- Jemput: ${jemput}
- Tujuan: ${tujuan}
- Catatan: ${catatan}
- Harga: Rp ${harga.toLocaleString()}`;

  window.open(
    "https://wa.me/" + k.no + "?text=" + encodeURIComponent(pesan),
    "_blank"
  );
}

// hitung awal
hitung();
</script>

</body>
</html>
